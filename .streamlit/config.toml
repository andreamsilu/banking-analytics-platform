[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

# Default to a light/white theme. Users can still switch Dark via ⋮ → Settings → Theme.
[theme]
base = "light"
primaryColor = "#1f4e79"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f7f9fc"
textColor = "#1e293b"
font = "sans serif"
